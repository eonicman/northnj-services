<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — North NJ Services</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #1a1a2e; }
        .header { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); color: #fff; padding: 2rem; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: .5rem; font-weight: 600; color: #0f3460; }
        input, textarea, select { width: 100%; padding: .75rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
        input:focus, textarea:focus { outline: none; border-color: #e94560; }
        .btn { display: block; width: 100%; background: #e94560; color: #fff; padding: 1rem; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #c23152; }
        .footer { background: #1a1a2e; color: #aaa; text-align: center; padding: 1.5rem; font-size: .85rem; margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Get In Touch</h1>
        <p>List your business or upgrade to Premium</p>
    </div>
    <div class="container">
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            <div class="form-group">
                <label>Business Name *</label>
                <input type="text" name="business" required>
            </div>
            <div class="form-group">
                <label>Your Name *</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Phone *</label>
                <input type="tel" name="phone" required>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>What do you need? *</label>
                <select name="interest" required>
                    <option value="">Select...</option>
                    <option value="new-listing">Free Business Listing</option>
                    <option value="premium">Premium Upgrade (9/month)</option>
                    <option value="annual">Annual Plan (90/year)</option>
                    <option value="advertising">Site Advertising</option>
                </select>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="4" placeholder="Tell us about your business and what you're looking for..."></textarea>
            </div>
            <button type="submit" class="btn">Send Message</button>
        </form>
        <p style="text-align:center; margin-top:1.5rem; color:#888;">
            Or call/text: <a href="tel:8552724773" style="color:#e94560;">(855) ARIA-773</a>
        </p>
    </div>
    <div class="footer">
        <p>© 2026 North NJ Services</p>
    </div>
</body>
</html>
